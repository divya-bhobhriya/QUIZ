<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main page</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        body {
            margin: 0;
            /*===background image===*/
            height: 100vh;
            width:100vw;
            overflow: hidden;
            /* no scrollbar will appear */
         background: radial-gradient(circle at 50% 15%, rgba(224, 198, 253, 0.28), transparent 24%), linear-gradient(180deg, rgba(17, 41, 96, 0.88), rgba(5, 15, 38, 0.95));
            /*background img*/
            background-size: cover;
            /* will cover the whole screen*/
            background-position: center;
            /*pic in the center*/

            /*Gradient*/
            

        }
         .container {
      outline-color: #3f6993;
      background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      /*margin-top: 50px;*/
      border-radius: 20px;
      border: #00ffff;
      border: 1px solid rgba(224, 198, 253, 0.18);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      position: relative;
    }

     /*   .container {
            width: 80vw;
            margin: auto;
        }*/


        .main-text {
            text-align: center;
            color: white;
            text-shadow: 0 0 5px #00d4ff,
                0 0 15px #1d3439,
                0 0 30px #00d4ff,
                0 0 60px #16525e;
            ;
            font-size: 30px;
            font-weight: 800;
            border: none;
        }

        /*carousel*/

        .carousel {
            margin: 100px auto;
            width: 90%;
            border: 5px solid none;
            display: flex;
            overflow-x: auto;
            position: relative;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        .group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2em;
            animation: spin 5s linear;
            padding-right: 1em;
        }

        .card {
            flex: 0 0 5em;
            height: 3.7em;
            background-color: #C7B7A3;
            font-size: 3rem;
            border-radius: 30px;
            text-align: center;
            align-content: center;
            overflow: hidden;
            /*stop image out from card*/
            animation: beat 2sec infinite;
        }

        card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /*to make the image size of carsoule*/
            border: radius 20px;
            display: block;
        }


       


        .card-b {
  border: 1.5px solid rgba(0, 212, 255, 0.35);
  box-shadow: 
    0 6px 20px rgba(0, 0, 0, 0.4);

}
  

.card-b:hover {
 border-color: #00d4ff;

  box-shadow:
    0 0 0 1px rgba(0, 212, 255, 0.5),
    0 8px 25px rgba(0, 0, 0, 0.45),
    0 0 28px rgba(0, 212, 255, 0.28);
}

.card-a {
  border: 1.5px solid rgba(0, 212, 255, 0.35);
  box-shadow: 
    0 6px 20px rgba(0, 0, 0, 0.4);

}

.card-a:hover {
 border-color: #00d4ff;

  box-shadow:
    0 0 0 1px rgba(0, 212, 255, 0.5),
    0 8px 25px rgba(0, 0, 0, 0.45),
    0 0 28px rgba(0, 212, 255, 0.28);
}


     /*responsive*/
        a {
            display: flex;
            text-decoration: none;
        }

        /*animation in the cards*/
        @keyframes beatUp {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes beatDown {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(10px);
            }
        }

        .animation1 {
            animation: beatUp 0.9s infinite;
        }

        .animation2 {
            animation: beatDown 0.9s infinite;
        }


      

    </style>
</head>

<body>
    <div class="position-absolute top-50 start-50 translate-middle text-center">
        <section>
            <div class="container">
                <div class="main-text pt-4 ps-2 pe-2">
                    Choose one from the categories below and see how many questions you can answer correctly!!
                </div>
                <div class="carousel">
                    <div class="group ps-1 pt-1 pb-1">
                        <a href="quiz.html?subject=biology">
                            <div class="card img-bio  card-a animation2">
                                <img src="img/biology.png" class="w-100" alt="">
                            </div>
                        </a>
                        <a href="quiz.html?subject=chemistry">
                            <div class="card img-chem card-a animation1">
                                <img src="img/chemistry.png" class="w-100" alt="">
                            </div>
                        </a>
                        <a href="quiz.html?subject=phycology">
                            <div class="card img-phyco card-a animation2">
                                <img src="img/phycologyy.png" class="w-100" alt="">
                            </div>
                        </a>
                        <a href="quiz.html?subject=geography">
                            <div class="card img-geo card-b animation1">
                                <img src="img/geography.png" class="w-100" alt="">
                            </div>
                        </a>
                        <a href="quiz.html?subject=maths">
                            <div class="card img-maths card-b animation2">
                                <img src="img/maths.png" class="w-100" alt="">
                            </div>
                        </a>
                        <a href="quiz.html?subject=physics">
                            <div class="card img-phys card-b animation1">
                                <img src="img/physics.png" class="w-100" alt="">
                            </div>
                        </a>
                    </div>
                </div>
                <div style="margin-bottom: 30px;"><label for=""><i class="fa-solid fa-angles-right fa-bounce arrow-icon"
                            style="color:white; text-shadow:0px 0px 30px rgb(68, 164, 237); font-size:30px;"></i></label>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>


</body>

</html>
