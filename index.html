<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Cube</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 15%, rgba(224, 198, 253, 0.28), transparent 24%), linear-gradient(180deg, rgba(17, 41, 96, 0.88), rgba(5, 15, 38, 0.95));
      overflow: hidden;

    }

    spline-viewer {
      width: 100%;
      display: block;
      margin-left: 450px;
      animation: floatRotate 6s ease-in-out infinite;
      filter: drop-shadow(0 0 10px #ff00ff) drop-shadow(0 0 20px #00ffff) drop-shadow(0 0 40px #ff00ff) drop-shadow(0 0 80px #00ffff);
      position: absolute;
      top: 0;
      right: 0%;
      left: -5%;
      z-index: 1;
      transform: scale(0.8);
      transform-origin: center center;
    }

    @media (max-width:1024px) {
      spline-viewer {
        width: 100%;
        display: block;
        margin-left: 250px;
        animation: floatRotate 6s ease-in-out infinite;
        filter: drop-shadow(0 0 10px #ff00ff) drop-shadow(0 0 20px #00ffff) drop-shadow(0 0 40px #ff00ff) drop-shadow(0 0 80px #00ffff);
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        transform: scale(0.5);
        transform-origin: center center;
      }
    }



    @keyframes floatRotate {
      0% {
        filter: drop-shadow(0 0 10px #3f6993) drop-shadow(0 0 30px #3f6993) drop-shadow(0 0 60px #3f6993);
      }

      25% {
        filter: drop-shadow(0 0 10px #5b56b6) drop-shadow(0 0 30px #5b56b6) drop-shadow(0 0 60px #5b56b6);
      }

      50% {
        filter: drop-shadow(0 0 10px #80aad3) drop-shadow(0 0 30px #80aad3) drop-shadow(0 0 60px #80aad3);
      }

      75% {
        filter: drop-shadow(0 0 10px #e0c6fd) drop-shadow(0 0 30px #e0c6fd) drop-shadow(0 0 60px #e0c6fd);
      }

      100% {
        filter: drop-shadow(0 0 10px #3f6993) drop-shadow(0 0 30px #3f6993) drop-shadow(0 0 60px #3f6993);
      }
    }

    .home-container {
      outline-color: #3f6993;
      background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      border-radius: 20px;
      height: 80vh;
      margin-top: 50px;
      border: #00ffff;
      border: 1px solid rgba(224, 198, 253, 0.18);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    .quiz-mark {
      border-radius: 20px;
      background: linear-gradient(140deg, #9b8ec7 0%, #5b56b6 50%, #80aad3 100%);
      /* align-items: center; */
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(91, 86, 182, 0.45);
      padding: 5px 20px;
      color: #fff;
      width: 20px;
      display: grid;
      font-size: xx-large;
      font-family: "Syne", sans-serif;
      margin: 1px;
      display: felx;
    }

    .quiz-logo {
      border-radius: 20px;
      font-weight: 800;
      color: #fff;
      width: 20px;
      display: grid;
      font-size: xx-large;
      font-family: "Syne", sans-serif;
      display: felx;
      align-items: center;
    }

    .home-content {
      font-size: 50px;
      font-weight: 800;
      font-family: "Syne", sans-serif;
      color: aliceblue;
      margin: 15px;
    }

    .description {
      color: darkgray;
      margin: 10px;
      text-align: justify;
    }

    .play-button {
      padding: 20px 40px;
      border: 3px solid transparent;
      background:
        linear-gradient(#3f6993, #0d0628) padding-box,
        linear-gradient(90deg, #22d3ee, #fff, #3f6993,#fff , #80aad3) border-box;
      color: aliceblue;
      border-radius: 35px;
      align-items: center;
      place-items: center;
      box-shadow: 0 0 40px #3f6993;
      font-size: larger;
      cursor: pointer;
      border: 3px solid transparent;
      margin-left: 50px;
    }

    .play-button:hover {
      opacity: 0.5;
    }

     

   
  </style>
</head>

<body>

  <div class="container-80">

    <div class="home-container">

      <div class="d-flex m-1">
        <div class="quiz-mark">Q</div>
        <div class="quiz-logo">uizkaroo</div>
      </div>
      <div class="col-12">
        <div class="col-6 p-5">
          <div class="home-content">Challenge your Knowledge</div>
          <div class="description">Explore a world of fun and learning with a wide range of trivia questions and
            puzzles.
            Challenge youself , compete with friends and expand your horizon.</div>
          </div>
          <div class="col-6">
          <button class="play-button">Let's Play</button>
 
        </div>
      </div>






      <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.87/build/spline-viewer.js"></script>
      <spline-viewer url="https://prod.spline.design/1sap9lWvz6MO7yht/scene.splinecode"></spline-viewer>
    </div>






</body>

</html>
