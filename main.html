<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index page</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
    body {
    margin: 0;


/*===background image===*/
    height: 100vh;
    overflow: hidden;  /* no scrollbar will appear */
    background-image: url('img/background.png'); /*background img*/
    background-size: cover;/* will cover the whole screen*/
    background-position: center;/*pic in the center*/
}

.container{
    width:90vw;
    margin: auto;
}


.main-text{
   text-align: center;
   color:white;
   text-shadow:  0 0 5px #00d4ff,
        0 0 15px #00d4ff,
        0 0 30px #00d4ff,
        0 0 60px #00d4ff;;
   font-size:25px;
   font-weight: 200;
   border:none;
}

/*carousel*/

.carousel{
    margin:100px auto;   
    width:90%;
    border:5px solid none;
    display: flex;
    overflow-x:auto;
}
.carousel::-webkit-scrollbar{
    display:none;
}
.group{
 display: flex ;  
 align-items: center;
 justify-content: center;
 gap: 1em;
 animation:spin 5s linear;
 padding-right: 1em ;    
}

.card{
    flex: 0 0 5em;
    height: 5em;
    background-color: #C7B7A3;
    font-size: 2.5rem;
    border-radius: 30px;
    text-align: center;
    align-content:center;
    overflow: hidden;/*stop image out from card*/
}
card img{
    width: 100%;
    height: 100%;
    object-fit:cover;/*to make the image size of carsoule*/
    border: radius 20px;
    display:block;
}
 .img-shadow{
    box-shadow: 0px 0px 10px rgb(255, 75, 204);
 }
 .img-shadoww{
    box-shadow: 0px 0px 10px #00d4ff;
 }
 

    </style>
</head>

<body>
      <div class="position-absolute top-50 start-50 translate-middle text-center">
        <div class="main-text">
            Choose one from the categories below and see how many questions you can answer correctly!!
        </div>
        <section>
        <div class="container">
            <div class="carousel">
                <div class="group">
                    <div class="card img-shadow">
                        <img src="img/biology.png" class="w-100" alt="">
                    </div>
                    <div class="card img-shadoww">
                        <img src="img/chemistry.png" class="w-100" alt="">
                    </div>
                    <div class="card img-shadow">
                        <img src="img/geography.png" class="w-100" alt="">
                    </div>
                    <div class="card img-shadoww">
                        <img src="img/maths.png" class="w-100" alt="">
                    </div>
                    <div class="card img-shadow">
                        <img src="img/phycology.png" class="w-100" alt="">
                    </div>
                    <div class="card img-shadoww">
                        <img src="img/physics.png" class="w-100" alt="">
                    </div>
                </div>
               <!-- <div aria-hidden class="group">
                    <div class="card">1</div>
                    <div class="card">2</div>
                    <div class="card">3</div>
                    <div class="card">4</div>
                    <div class="card">5</div>
                    <div class="card">6</div>
                </div>-->
            </div>
        </div>
    </section>
    </div>


   
        
</body>

</html>
